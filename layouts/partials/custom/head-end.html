<script>
(function() {
  var path = window.location.pathname;
  
  // 1. Synchronize preferred-lang with the current path language on page load
  if (path.startsWith('/pt/') || path === '/pt') {
    localStorage.setItem('preferred-lang', 'pt');
  } else if (path.startsWith('/es/') || path === '/es') {
    localStorage.setItem('preferred-lang', 'es');
  } else if (path.startsWith('/en/') || path === '/en') {
    localStorage.setItem('preferred-lang', 'en');
  } else if (path === '/' || path === '/index.html') {
    // We are on the root path (default language = en)
    var prefLang = localStorage.getItem('preferred-lang');
    if (!prefLang) {
      // First visit: detect browser language
      var userLang = (navigator.language || navigator.userLanguage || '').toLowerCase();
      if (userLang.startsWith('pt')) {
        prefLang = 'pt';
      } else if (userLang.startsWith('es')) {
        prefLang = 'es';
      } else {
        prefLang = 'en';
      }
      localStorage.setItem('preferred-lang', prefLang);
    }
    
    // Redirect if the preferred language is not English
    if (prefLang === 'pt') {
      window.location.replace('/pt/');
    } else if (prefLang === 'es') {
      window.location.replace('/es/');
    }
  }

  // 2. Intercept clicks on language selector links to update preferred-lang immediately
  document.addEventListener('click', function(e) {
    var langLink = e.target.closest('.hextra-language-options a');
    if (langLink) {
      try {
        var url = new URL(langLink.href, window.location.href);
        var p = url.pathname;
        if (p.startsWith('/pt/') || p === '/pt' || p === '/pt/') {
          localStorage.setItem('preferred-lang', 'pt');
        } else if (p.startsWith('/es/') || p === '/es' || p === '/es/') {
          localStorage.setItem('preferred-lang', 'es');
        } else {
          localStorage.setItem('preferred-lang', 'en');
        }
      } catch (err) {
        // Fallback
      }
    }
  });
})();
</script>
