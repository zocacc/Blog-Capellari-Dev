baseURL: https://enzocapellari.is-a.dev/
title: Capellari Dev
defaultContentLanguage: pt
enableRobotsTXT: true

languages:
  pt:
    label: Português (Brasil)
    locale: pt_BR
    weight: 1

module:
  imports:
    - path: github.com/imfing/hextra

outputs:
  home:
    - HTML
    - RSS
  section:
    - HTML
    - RSS
  taxonomy:
    - HTML
    - RSS
  term:
    - HTML
    - RSS

taxonomies:
  tag: tags
  category: categorias

sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

permalinks:
  blog: /blog/:year/:slug/

menu:
  main:
    - name: Início
      pageRef: /
      weight: 1
    - name: Blog
      pageRef: /blog
      weight: 2
    - name: Projetos
      pageRef: /projetos
      weight: 3
    - name: Sobre
      pageRef: /about
      weight: 4
    - name: Busca
      weight: 5
      params:
        type: search
    - name: GitHub
      url: "https://github.com/zocacc"
      weight: 6
      params:
        icon: github
    - name: X/Twitter
      url: "https://x.com/zocacc"
      weight: 7
      params:
        icon: x-twitter

params:
  description: Engenharia, software, redes e projetos construídos enquanto aprendo.
  displayUpdatedDate: true

  author:
    name: Enzo Capellari

  page:
    width: wide

  navbar:
    displayTitle: true
    displayLogo: false
    width: wide

  theme:
    default: system
    displayToggle: true

  footer:
    enable: true
    displayCopyright: false
    displayPoweredBy: false
    width: wide

  blog:
    list:
      displayTags: true
      pagerSize: 10
      sortBy: date
      sortOrder: desc
    article:
      displayPagination: true

  toc:
    displayTags: true

  editURL:
    enable: false

  social:
    x: zocacc

  # Add a default social card at static/images/social-card.png and uncomment if needed.
  # images:
  #   - /images/social-card.png
